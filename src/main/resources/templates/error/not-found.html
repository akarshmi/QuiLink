<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFFDF5;
            font-family: "Space Grotesk", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 560px;
            background: white;
            border: 4px solid #000;
            box-shadow: 8px 8px 0 #000;
            padding: 48px 48px 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .badge {
            display: inline-block;
            background: #FF6B6B;
            border: 4px solid #000;
            padding: 8px 18px;
            font-size: 48px;
            font-weight: 900;
            align-self: center;
        }

        h1 {
            margin-top: 24px;
            font-size: 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        p {
            margin-top: 18px;
            font-size: 18px;
            line-height: 1.6;
            color: #333;
        }

        .code {
            margin-top: 28px;
            display: inline-block;
            background: #f5f5f5;
            border: 2px dashed #000;
            padding: 10px 18px;
            font-family: monospace;
            font-size: 15px;
            word-break: break-all;
            align-self: center;
        }

        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 14px 28px;
            background: #FFD93D;
            color: #000;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            border: 4px solid #000;
            box-shadow: 4px 4px 0 #000;
            transition: .15s;
            align-self: center;
        }

        .btn:hover {
            background: #f0cc3a;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="badge">404</div>

    <h1>Link Not Found</h1>

    <p>
        The short link you're trying to open doesn't exist
        or has never been created.
    </p>

    <div class="code">go.akarshmi.dev/{shortCode}</div>

    <a class="btn" href="https://lynk.akarshmi.dev">
        Create New Link
    </a>

</div>

</body>
</html>
